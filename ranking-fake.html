<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ranking — Álbum Copa 2026</title>
<meta name="theme-color" content="#006233">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#006233;--gd:#004d26;--gl:#00a854;
  --gold:#FFD700;--goldd:#e6c200;
  --bg:#0d1b2a;--bg2:#132238;--bg3:#1a2f47;
  --card:rgba(255,255,255,.06);--cardh:rgba(255,255,255,.11);
  --txt:#f0f4f8;--muted:rgba(240,244,248,.55);--dim:rgba(240,244,248,.3);
  --red:#ef4444;--orange:#f59e0b;--em:#10b981;
  --r:13px;--rlg:20px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
  background:var(--bg);color:var(--txt);min-height:100vh;
  overflow-x:hidden;-webkit-tap-highlight-color:transparent
}
#hdr{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(135deg,var(--gd) 0%,var(--g) 55%,#007d40 100%);
  box-shadow:0 2px 20px rgba(0,0,0,.5)
}
.hdr-inner{padding:11px 15px 9px}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.hdr-left{display:flex;align-items:center;gap:8px}
.hdr-title{font-size:1.05rem;font-weight:800;letter-spacing:.2px;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.hdr-title span{color:var(--gold)}
.hdr-sub{font-size:.62rem;opacity:.72;letter-spacing:1.4px;text-transform:uppercase;margin-top:1px}
.prog-track{background:rgba(0,0,0,.35);border-radius:20px;height:6px;overflow:hidden}
.prog-fill{
  height:100%;background:linear-gradient(90deg,var(--goldd),var(--gold),#ffe566);
  border-radius:20px;width:100%;position:relative;overflow:hidden
}
.prog-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
  background-size:200% 100%;animation:shine 2.5s infinite
}
@keyframes shine{0%{background-position:-200% 0}100%{background-position:200% 0}}
.btn-back{
  background:rgba(255,255,255,.18);border:none;color:#fff;
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:17px;text-decoration:none;flex-shrink:0
}
#app{padding-bottom:40px;max-width:480px;margin:0 auto}
.rank-hero{padding:20px 15px 12px;text-align:center}
.rank-hero h2{font-size:1.35rem;font-weight:900;margin-bottom:4px}
.rank-hero p{font-size:.72rem;color:var(--muted)}
.rank-wrap{padding:0 15px 20px}
.rank-card{background:var(--card);border-radius:var(--r);padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.06)}
.rank-card.top1{border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.07)}
.rank-card.top2{border-color:rgba(192,192,192,.3);background:rgba(192,192,192,.05)}
.rank-card.top3{border-color:rgba(205,127,50,.3);background:rgba(205,127,50,.05)}
.rank-pos{font-size:1.2rem;font-weight:900;min-width:32px;text-align:center;line-height:1}
.rank-pos.p1{color:var(--gold)}.rank-pos.p2{color:#c0c0c0}.rank-pos.p3{color:#cd7f32}
.rank-pos.pn{font-size:.95rem;color:var(--muted)}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:.9rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-sub{font-size:.63rem;color:var(--muted);margin-top:2px}
.rank-right{text-align:right;flex-shrink:0}
.rank-num{font-size:1.05rem;font-weight:900;color:var(--em);line-height:1}
.rank-pct{font-size:.63rem;color:var(--muted);margin-top:2px}
.rank-bar-wrap{margin-top:4px;height:3px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden;width:60px}
.rank-bar{height:100%;background:var(--em);border-radius:10px}
.rank-bar.gold{background:var(--gold)}
.podium{display:flex;gap:6px;padding:0 15px 16px;align-items:flex-end;justify-content:center}
.pod-card{flex:1;background:var(--card);border-radius:var(--r);padding:14px 8px 12px;text-align:center;border:1px solid rgba(255,255,255,.06);max-width:140px}
.pod-card.p1{border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.07);order:2}
.pod-card.p2{border-color:rgba(192,192,192,.3);background:rgba(192,192,192,.05);order:1}
.pod-card.p3{border-color:rgba(205,127,50,.3);background:rgba(205,127,50,.05);order:3}
.pod-medal{font-size:1.8rem;margin-bottom:6px}
.pod-name{font-size:.72rem;font-weight:800;line-height:1.3;margin-bottom:4px}
.pod-num{font-size:1.1rem;font-weight:900;color:var(--em)}
.pod-pct{font-size:.6rem;color:var(--muted)}
.sec-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);font-weight:600;margin:0 15px 10px;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07)}
@media(min-width:520px){
  #hdr{max-width:480px;left:50%;transform:translateX(-50%);right:auto;position:sticky;transform:none;left:0;right:0;max-width:100%}
}
</style>
</head>
<body>
<div id="hdr">
  <div class="hdr-inner">
    <div class="hdr-row">
      <div class="hdr-left">
        <a href="/" class="btn-back">←</a>
        <div>
          <div class="hdr-title">🏆 <span>Ranking</span></div>
          <div class="hdr-sub">Top colecionadores · Copa 2026</div>
        </div>
      </div>
    </div>
    <div class="prog-track"><div class="prog-fill"></div></div>
  </div>
</div>

<div id="app">
  <div class="rank-hero">
    <h2>🏆 Ranking Geral</h2>
    <p>Top 50 colecionadores da Copa 2026 · 1.080 figurinhas</p>
  </div>

  <div class="podium">
    <div class="pod-card p2">
      <div class="pod-medal">🥈</div>
      <div class="pod-name">Lucas Ferreira</div>
      <div class="pod-num">961</div>
      <div class="pod-pct">89% completo</div>
    </div>
    <div class="pod-card p1">
      <div class="pod-medal">🥇</div>
      <div class="pod-name">Gabriel Almeida</div>
      <div class="pod-num">1.034</div>
      <div class="pod-pct">95% completo</div>
    </div>
    <div class="pod-card p3">
      <div class="pod-medal">🥉</div>
      <div class="pod-name">Matheus Costa</div>
      <div class="pod-num">948</div>
      <div class="pod-pct">87% completo</div>
    </div>
  </div>

  <div class="sec-lbl">Classificação completa</div>
  <div class="rank-wrap" id="ranking-list"></div>
</div>

<script>

  {name:"Adriana Coelho",      have:194,  repeat:1,   pct:17},
  {name:"Mônica Duarte",       have:137,  repeat:0,   pct:12},
];

const list = document.getElementById('ranking-list');
const TOTAL = 1080;

players.forEach((p, i) => {
  const pos = i + 1;
  const icon = pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':pos;
  const posClass = pos<=3 ? 'p'+pos : 'pn';
  const cardClass = pos<=3 ? 'top'+pos : '';
  const barW = Math.round(p.have/TOTAL*100);
  const barClass = pos===1 ? 'gold' : '';

  list.innerHTML += `<div class="rank-card ${cardClass}">
    <div class="rank-pos ${posClass}">${icon}</div>
    <div class="rank-info">
      <div class="rank-name">${p.name}</div>
      <div class="rank-sub">${p.repeat} repetidas</div>
      <div class="rank-bar-wrap"><div class="rank-bar ${barClass}" style="width:${barW}%"></div></div>
    </div>
    <div class="rank-right">
      <div class="rank-num">${p.have.toLocaleString('pt-BR')}</div>
      <div class="rank-pct">${p.pct}% completo</div>
    </div>
  </div>`;
});
</script>
</body>
</html>
